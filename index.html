<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametry Procesowe Argonowania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Program do obliczeń parametrów procesowych argonowania</h1>
        <p class="subtitle">Modelowanie fizyczne procesów metalurgicznych (Kryterium Froude'a)</p>

        <div class="grid-layout">
            <div class="panel section-blue">
                <h3>Właściwości cieczy</h3>
                <div class="input-group">
                    <label>Masa Stali</label>
                    <input type="number" id="masa" placeholder="np. 100">
                    <span class="unit">kg</span>
                </div>
                <div class="input-group">
                    <label>Gęstość Stali</label>
                    <input type="number" id="gestosc" placeholder="np. 7000">
                    <span class="unit">kg/m³</span>
                </div>
                <div class="input-group result-group">
                    <label>Objętość Stali</label>
                    <input type="text" id="objetosc-stali-1" readonly>
                    <span class="unit">m³</span>
                </div>
            </div>

            <div class="panel section-orange">
                <h3>Geometria kadzi</h3>
                <div class="input-group">
                    <label>Średnica górna (D)</label>
                    <input type="number" id="D" placeholder="np. 2.5">
                    <span class="unit">m</span>
                </div>
                <div class="input-group">
                    <label>Średnica dolna (d)</label>
                    <input type="number" id="d" placeholder="np. 2.0">
                    <span class="unit">m</span>
                </div>
                <div class="input-group">
                    <label>Wysokość cieczy (h)</label>
                    <input type="number" id="h" placeholder="np. 3.0">
                    <span class="unit">m</span>
                </div>
                <div class="input-group result-group">
                    <label>Objętość Stali</label>
                    <input type="text" id="objetosc-stali-2" readonly>
                    <span class="unit">m³</span>
                </div>
            </div>

            <div class="panel section-green">
                <h3>Parametry podobieństwa</h3>
                <div class="input-group">
                    <label>Stała (C)</label>
                    <input type="number" id="C" placeholder="Wartość C">
                </div>
                <div class="input-group">
                    <label>Stała modelu (C')</label>
                    <input type="number" id="C_prime" placeholder="Wartość C'">
                </div>
                <div class="input-group">
                    <label>Współcz. skali (S<sub>L</sub>)</label>
                    <input type="number" id="SL" placeholder="Wartość Skali">
                </div>
            </div>

            <div class="panel section-grey">
                <h3>Strumień gazu</h3>
                <div class="input-group">
                    <label>Strumień gazu (Q)</label>
                    <input type="number" id="Q" placeholder="Wartość Q">
                    <select id="jednostka-Q"><option>m³/s</option><option>dm³/min</option></select>
                </div>
                <div class="input-group result-group highlight">
                    <label>Strumień w modelu (Q')</label>
                    <input type="text" id="Q_prime" readonly>
                    <span class="unit" id="jednostka-Q-wynik">m³/s</span>
                </div>
            </div>
        </div>

        <button class="calc-btn" onclick="obliczWszystko()">Oblicz wszystko</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
